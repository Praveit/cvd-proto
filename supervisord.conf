[supervisord]
nodaemon=true
loglevel=info
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port 7860 --workers 1
directory=/app/api
user=appuser
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/fastapi.log
stderr_logfile=/var/log/supervisor/fastapi.err.log
environment=PYTHONPATH="/app/api",PYTHONUNBUFFERED=1

[program:nextjs]
command=npm start
directory=/app/clinical-dashboard
user=appuser
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nextjs.log
stderr_logfile=/var/log/supervisor/nextjs.err.log
environment=NODE_ENV=production,PORT=3000,HOSTNAME=0.0.0.0

[program:nginx]
command=nginx -g "daemon off;"
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.err.log
priority=100

[program:fastapi-health]
command=python -c "import time; time.sleep(10); import requests; requests.get('http://localhost:7860/health', timeout=5)" || true
user=appuser
autostart=false
autorestart=false
stdout_logfile=/dev/null
stderr_logfile=/dev/null